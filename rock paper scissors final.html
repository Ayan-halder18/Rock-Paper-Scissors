<!DOCTYPE html>
<html>
    <head>
        <title>Rock Paper Scissors</title>
        <link rel="stylesheet" href="rock-paper-scissors.css">
    </head>
    <body>
        <p class="heading">Rock Paper Scissors</p>

    
        <button onclick="
        playGame('rock');
        " class="rock-button"><img class="rock" src="pictures/rock-emoji.png"></button>


        <button onclick="
        playGame('paper');
        " class="paper-button"><img class="paper" src="pictures/paper-emoji.png"></button>
        

        <button onclick="
        playGame('scissors');
        " class="scissor-button"><img class="scissor" src="pictures/scissors-emoji.png"></button>
       

        <p class="js-result result"></p>
        <p class="js-move move"></p>
        <p class="js-score"></p>

        <button onclick="
            score.wins = 0;
            score.losses = 0;
            score.ties = 0 ;
            localStorage.removeItem('score');
            updateScoreElement();
        " class="reset-button">Reset score</button>
    
    
        <script src="rock-paper-scissors.js"></script>
    </body>
</html>
